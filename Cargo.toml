[workspace]
resolver = "2"
members = [
    "crates/vox_core",
    "crates/vox_data",
    "crates/vox_render",
    "crates/vox_app",
    "crates/vox_nn",
    "crates/vox_sim",
]

[workspace.package]
edition = "2024"
version = "0.1.0"
license = "MIT"

[workspace.dependencies]
glam = { version = "0.29", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
half = { version = "2", features = ["bytemuck"] }
bytemuck = { version = "1", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
thiserror = "2"
zstd = "0.13"
bevy_ecs = "0.16"
bevy_app = "0.16"
dashmap = "6"
toml = "0.8"
