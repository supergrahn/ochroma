name: Release

# Hand-rolled release pipeline for the Ochroma engine.
#
# WHY NOT cargo-dist?
# Ochroma's workspace references TWO sibling repos via relative path deps
# (`../../../spectra/...` in vox_render, `../../../crucible/...` in vox_nodes —
# the latter a *default* feature). Cargo must load those manifests for ANY
# build, so a lone checkout can never compile (see the note at the top of
# ci.yml). cargo-dist's standard GitHub-runner flow checks out only the tagged
# repo and offers no clean hook to lay sibling repos out side-by-side under
# $GITHUB_WORKSPACE before the build. Rather than fight it, we mirror ci.yml's
# proven three-repo checkout exactly and build/package by hand. Honest and
# simple beats fashionable.
#
# REQUIRED SECRET: `SIBLING_REPOS_PAT` — same fine-grained PAT ci.yml uses, with
# read-only Contents access to supergrahn/spectra and supergrahn/crucible (both
# private).
#
# SCOPE: Linux x86_64 only. The windows/macos targets have never compiled (the
# CI portability job is experimental). To expand later: add a build matrix with
# the corresponding runners + per-target cross/native toolchains, gated on those
# platforms actually building, and emit one archive per target below.

permissions:
  contents: write

# Triggers on any version-like tag, e.g. "v0.1.0", "0.1.0", "v1.2.3-rc.1".
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
      - '[0-9]+.[0-9]+.[0-9]+*'

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: ochroma

jobs:
  release-linux:
    name: Build + publish Linux x86_64 artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      # Four-repo side-by-side checkout — mirrors ci.yml. ochroma's path deps
      # resolve `../../../{spectra,crucible,openusd-rs}` from each crate dir to
      # $GITHUB_WORKSPACE/{spectra,crucible,openusd-rs}.
      - uses: actions/checkout@v4
        with:
          path: ochroma

      - uses: actions/checkout@v4
        with:
          repository: supergrahn/spectra
          token: ${{ secrets.SIBLING_REPOS_PAT }}
          path: spectra

      - uses: actions/checkout@v4
        with:
          repository: supergrahn/crucible
          token: ${{ secrets.SIBLING_REPOS_PAT }}
          path: crucible

      - uses: actions/checkout@v4
        with:
          repository: supergrahn/openusd-rs
          token: ${{ secrets.SIBLING_REPOS_PAT }}
          path: openusd-rs

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (ALSA for CPAL audio)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ochroma/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('ochroma/**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build release (default features)
        run: cargo build --release --workspace

      # Headless smoke gate before we ship: the two shipped binaries must run
      # their real sim + software render and exit 0. Catches "compiles but the
      # game is broken" on the exact artifact we're about to upload.
      - name: Smoke walking_sim
        run: ./target/release/walking_sim --smoke

      - name: Smoke ochroma
        run: ./target/release/ochroma --smoke

      - name: Package artifacts
        id: package
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          STAGE="ochroma-${VERSION}-x86_64-unknown-linux-gnu"
          mkdir -p "dist-stage/${STAGE}"

          # The three shipped binaries: editor, game, and net demo.
          cp target/release/ochroma "dist-stage/${STAGE}/"
          cp target/release/walking_sim "dist-stage/${STAGE}/"
          cp target/release/net_walk "dist-stage/${STAGE}/"

          cp README.md LICENSE "dist-stage/${STAGE}/" 2>/dev/null || cp README.md "dist-stage/${STAGE}/"

          tar -czf "${STAGE}.tar.gz" -C dist-stage "${STAGE}"
          sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

          echo "tarball=ochroma/${STAGE}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=ochroma/${STAGE}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          PRERELEASE=""
          case "$VERSION" in
            *-*) PRERELEASE="--prerelease" ;;
          esac
          NOTES="Ochroma ${VERSION} — Linux x86_64 release.

          Spectral Gaussian Splatting engine. Artifact contains three binaries:
          \`ochroma\` (editor), \`walking_sim\` (game), \`net_walk\` (net demo).
          Built and smoke-tested on ubuntu-latest. Windows/macOS not yet supported.

          Install:
          \`\`\`
          tar -xzf ochroma-${VERSION}-x86_64-unknown-linux-gnu.tar.gz
          ./ochroma-${VERSION}-x86_64-unknown-linux-gnu/walking_sim --smoke
          \`\`\`"

          # Create the release if it doesn't already exist, then upload assets.
          if ! gh release view "$VERSION" >/dev/null 2>&1; then
            gh release create "$VERSION" \
              --title "Ochroma $VERSION" \
              --notes "$NOTES" \
              $PRERELEASE \
              --target "$GITHUB_SHA"
          fi

          gh release upload "$VERSION" \
            "ochroma-${VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            "ochroma-${VERSION}-x86_64-unknown-linux-gnu.tar.gz.sha256" \
            --clobber
