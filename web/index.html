<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ochroma — Spectral Gaussian Splatting</title>
  <style>
    body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #status { color: #fff; font-family: monospace; font-size: 14px; position: absolute; top: 16px; left: 16px; }
  </style>
</head>
<body>
  <canvas id="ochroma-canvas"></canvas>
  <!--
    The #status text is owned by the Rust/wasm side (vox_web). It shows
    "Initialising WebGPU…" during adapter/device bring-up and only flips to
    "Ready" AFTER the WebGPU device is actually acquired and the canvas surface
    is configured. Do not set it to "Ready" here — that would lie about GPU
    readiness while the async bring-up is still in flight.
  -->
  <div id="status">Loading…</div>
  <script type="module">
    import init from './hello_splat.js';
    try {
      // `init()` runs the wasm `start` shim, which kicks off the async WebGPU
      // bring-up. The status is driven from Rust as that bring-up progresses.
      await init();
    } catch (err) {
      document.getElementById('status').textContent = 'WebGPU init failed — see console';
      console.error(err);
    }
  </script>
</body>
</html>
